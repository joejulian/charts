apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "plex.fullname" . }}-test-connection"
  labels:
    {{- include "plex.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  containers:
    - name: plex
      image: bash:5.2.37
      command: ["bash", "-ec"]
      args:
        - |
          exec 3<>/dev/tcp/{{ include "plex.fullname" . }}/32400
          exec 3>&-
  restartPolicy: Never
