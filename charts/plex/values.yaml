replicaCount: 1

image:
  repository: registry.gitlab.com/joejulian/container-plex-media-server-plexpass
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
podAnnotations: {}
podLabels: {}
resources: {}

podSecurityContext:
  fsGroup: 65500
  supplementalGroups:
    - 91

securityContext:
  runAsUser: 65500
  runAsGroup: 65500

initContainer:
  enabled: true
  image: ghcr.io/containerd/busybox:1.36
  command:
    - sh
    - -c
    - |
      mkdir -p "/config/Library/Application Support/Plex Media Server/Logs"
      mkdir -p "/config/Library/Application Support/Plex Media Server/Cache"
      chown -R 65500:65500 /config

priorityClass:
  create: false
  name: ""
  value: 500000
  description: High priority class for plex pods

env:
  - name: PUID
    value: "65500"
  - name: PGID
    value: "65500"
  - name: PLEX_MEDIA_SERVER_APPLICATION_SUPPORT_DIR
    value: /config/Library/Application Support

service:
  main:
    enabled: true
    type: ClusterIP
  loadBalancer:
    enabled: false
    annotations: {}
    loadBalancerIP: ""
    externalTrafficPolicy: Cluster

ingresses: []

certificate:
  enabled: false
  name: plex-cert
  secretName: plex-cert
  issuerRef:
    kind: ClusterIssuer
    name: ""
  dnsNames: []
  keystores:
    pkcs12:
      enabled: false
      profile: Modern2023
      passwordSecretRef:
        name: ""
        key: key

persistence:
  config:
    enabled: false
    existingClaim: ""
    accessModes:
      - ReadWriteOnce
    size: 10Gi
  media:
    enabled: false
    existingClaim: ""
    accessModes:
      - ReadWriteMany
    size: 10Gi
    storageClassName: ""
    volumeName: ""

tls:
  existingSecret: ""
  mountPath: /pki

nodeSelector: {}
tolerations: []
affinity: {}
terminationGracePeriodSeconds: 120
