name: Release

on:
  push:
    branches:
      - master
      - main

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: azure/setup-helm@v5
      - name: Add Helm Repositories
        run: ./scripts/setup-helm-repos.sh
      - name: Login to GHCR
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_PASSWORD: ${{ github.token }}
        run: echo "${GHCR_PASSWORD}" | helm registry login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
      - name: Configure Git Identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Make Scripts Executable
        run: chmod +x scripts/*.sh
      - name: Release Changed Charts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          GHCR_PACKAGE_TOKEN: ${{ github.token }}
        run: ./scripts/release-charts.sh "${{ github.event.before }}" "${{ github.sha }}"
      - name: Repair Missing Releases For Changed Charts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/repair-chart-releases.sh --changed "${{ github.event.before }}" "${{ github.sha }}"
      - name: Push Tags
        run: git push --tags
