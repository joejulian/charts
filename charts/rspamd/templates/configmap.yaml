apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rspamd.fullname" . }}-local
  labels:
    {{- include "rspamd.labels" . | nindent 4 }}
data:
  {{- range $name, $content := .Values.config.local }}
  {{ $name }}: |
{{ $content | indent 4 }}
  {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rspamd.fullname" . }}-override
  labels:
    {{- include "rspamd.labels" . | nindent 4 }}
data:
  {{- range $name, $content := .Values.config.override }}
  {{ $name }}: |
{{ $content | indent 4 }}
  {{- end }}
