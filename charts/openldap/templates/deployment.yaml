apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ default (include "openldap.fullname" .) .Values.deploymentName }}
  labels:
    app: {{ template "openldap.name" . }}
    chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- if .Values.selectorLabels }}
{{ toYaml .Values.selectorLabels | indent 6 }}
      {{- else }}
      app: {{ template "openldap.name" . }}
      release: {{ .Release.Name }}
      {{- end }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
      labels:
        {{- if .Values.selectorLabels }}
{{ toYaml .Values.selectorLabels | indent 8 }}
        {{- else }}
        app: {{ template "openldap.name" . }}
        release: {{ .Release.Name }}
        {{- end }}
        {{- if .Values.podLabels }}
{{ toYaml .Values.podLabels | indent 8 }}
        {{- end }}
    spec:
      initContainers:
        - name: init-data
          image: {{ .Values.initContainer.image }}
          command:
            - sh
            - -c
            - mkdir -p {{ .Values.dataMountPath }}/slapd.d {{ .Values.dataMountPath }}/data && chown -R 439:439 {{ .Values.dataMountPath }}/slapd.d {{ .Values.dataMountPath }}/data
          volumeMounts:
            - name: data
              mountPath: {{ .Values.dataMountPath }}
      containers:
        - name: {{ .Values.containerName }}
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
{{ if .Values.args }}
          args:
{{ toYaml .Values.args | indent 12 }}
{{ else if .Values.configfiles }}
          args:
            - -h
            - ldap://:{{ .Values.service.internalPort }}
            - -F
            - {{ .Values.dataMountPath }}/slapd.d
            - -f
            - /config/slapd.conf
            - -d
            - "0x8100"
{{ else if not .Values.configfiles }}
          args:
            - -F
            - {{ .Values.dataMountPath }}/slapd.d
{{ end }}
          ports:
            - containerPort: {{ .Values.service.internalPort }}
          livenessProbe:
            tcpSocket:
              port: {{ .Values.service.internalPort }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.dataMountPath }}
{{ if .Values.configfiles }}
            - name: config
              mountPath: /config
{{ end }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ default (include "openldap.name" .) .Values.persistence.existingClaim }}
{{ if .Values.configfiles }}
        - name: config
          configMap:
            name: {{ template "openldap.name" . }}
{{ end }}
{{ if .Values.configdb.enabled }}
        - name: initdata
          secret:
            name: {{ template "openldap.name" . }}
{{ end }}
    {{- if .Values.nodeSelector }}
      nodeSelector:
{{ toYaml .Values.nodeSelector | indent 8 }}
    {{- end }}
