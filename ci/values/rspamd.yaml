config:
  local:
    actions.conf: |
      reject = 15;
      add_header = 5;
      greylist = 10;
    logging.inc: |
      type = "console";
      level = "warning";
    worker-controller.inc: |
      bind_socket = "0.0.0.0:11334";
    worker-normal.inc: |
      bind_socket = "0.0.0.0:11333";
    worker-proxy.inc: |
      bind_socket = "0.0.0.0:11332";
  override:
    milter_headers.conf: |
      extended_spam_headers = true;

imagePullSecrets:
  - name: ghcr-auth

persistence:
  enabled: false
