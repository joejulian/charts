{{- if and (not .Values.dkim.existingSecret) .Values.dkim.inlineSecretData }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rspamd.fullname" . }}-dkim
  labels:
    {{- include "rspamd.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $name, $value := .Values.dkim.inlineSecretData }}
  {{ $name }}: |
{{ $value | indent 4 }}
  {{- end }}
{{- end }}
