apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "justmount.fullname" . }}-test-readiness"
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  serviceAccountName: "{{ include "justmount.fullname" . }}-test"
  containers:
    - name: kubectl
      image: rancher/kubectl:v1.32.2
      command: ["kubectl"]
      args:
        - rollout
        - status
        - daemonset/{{ include "justmount.fullname" . }}
        - -n
        - {{ .Release.Namespace }}
        - --timeout=180s
  restartPolicy: Never
