apiVersion: v1
kind: ServiceAccount
metadata:
  name: "{{ include "learner.fullname" . }}-test"
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: "{{ include "learner.fullname" . }}-test"
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: "{{ include "learner.fullname" . }}-test"
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: "{{ include "learner.fullname" . }}-test"
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: "{{ include "learner.fullname" . }}-test"
---
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "learner.fullname" . }}-test-cronjob"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "learner.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  serviceAccountName: "{{ include "learner.fullname" . }}-test"
  containers:
    - name: kubectl
      image: rancher/kubectl:v1.32.2
      command: ["kubectl"]
      args:
        - get
        - cronjob
        - {{ include "learner.fullname" . }}
        - -n
        - {{ .Release.Namespace }}
  restartPolicy: Never
