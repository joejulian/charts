apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "rspamd.fullname" . }}-test-connection"
  labels:
    {{- include "rspamd.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  containers:
    - name: rspamd
      image: bash:5.2.37
      command: ["bash", "-ec"]
      args:
        - |
          exec 3<>/dev/tcp/{{ include "rspamd.fullname" . }}/{{ .Values.services.proxy.port }}
          exec 3>&-
  restartPolicy: Never
